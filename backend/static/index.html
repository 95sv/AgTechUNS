<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AgTechUNS — Panel de Control</title>

  <!-- Tailwind (utilitarios de estilo) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Leaflet (mapas) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

  <!-- Alpine.js (reactividad declarativa) -->
  <script defer src="https://unpkg.com/alpinejs@3.13.5/dist/cdn.min.js"></script>

  <!-- Fuente -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    #mapa { height: 100%; min-height: 500px; border-radius: 1rem; }
    .leaflet-container { font-family: inherit; }
    [x-cloak] { display: none !important; }
  </style>
</head>

<body class="bg-stone-50 text-stone-800 min-h-screen" x-data="dashboard()" x-init="cargar(); setInterval(cargar, 10000)" x-cloak>

  <!-- Barra superior -->
  <header class="bg-white border-b border-stone-200">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-emerald-600 flex items-center justify-center text-white text-xl font-bold">🌾</div>
        <div>
          <h1 class="text-xl font-semibold text-stone-900">AgTechUNS</h1>
          <p class="text-xs text-stone-500">Panel de Control — Comisión 13 · UNS 2026</p>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <div class="text-xs text-stone-500">
          Última actualización: <span x-text="ultimaActualizacion"></span>
        </div>
        <button @click="evaluarAnalytics()"
          :disabled="evaluando"
          class="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 disabled:bg-stone-300 text-white text-sm font-medium rounded-lg transition shadow-sm">
          <span x-show="!evaluando">⚡ Evaluar análisis</span>
          <span x-show="evaluando">Procesando...</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Contenido -->
  <main class="max-w-7xl mx-auto px-6 py-6 grid grid-cols-1 lg:grid-cols-3 gap-6">

    <!-- Mapa (2/3 ancho en desktop) -->
    <section class="lg:col-span-2 bg-white rounded-2xl border border-stone-200 p-4 shadow-sm">
      <div class="flex items-center justify-between mb-3 px-2">
        <h2 class="text-lg font-semibold text-stone-900">Mapa de parcelas</h2>
        <span class="text-xs text-stone-500">Bahía Blanca, Argentina</span>
      </div>
      <div id="mapa"></div>
    </section>

    <!-- Panel lateral (1/3 ancho) -->
    <aside class="space-y-6">

      <!-- Cards de parcelas -->
      <section class="space-y-4">
        <h2 class="text-lg font-semibold text-stone-900 px-1">Parcelas en línea</h2>

        <template x-for="p in parcelas" :key="p.nombre_parcela">
          <div class="bg-white rounded-2xl border border-stone-200 p-5 shadow-sm">
            <div class="flex items-center justify-between mb-4">
              <div class="flex items-center gap-2">
                <div class="w-2 h-2 rounded-full"
                  :class="p.ultima_lectura ? 'bg-emerald-500' : 'bg-stone-300'"></div>
                <h3 class="font-semibold text-stone-900" x-text="p.nombre_parcela"></h3>
              </div>
              <span class="text-xs text-stone-400" x-text="p.nombre_codigo_sensor"></span>
            </div>

            <!-- Datos del sensor -->
            <div class="grid grid-cols-2 gap-3 mb-4">
              <div class="bg-blue-50 rounded-lg p-3">
                <div class="text-xs text-blue-700 font-medium uppercase tracking-wide">Humedad suelo</div>
                <div class="text-2xl font-bold text-blue-900 mt-1">
                  <span x-text="p.ultima_lectura?.valor_humedad?.toFixed(1) ?? '—'"></span>
                  <span class="text-base font-normal text-blue-600">%</span>
                </div>
              </div>
              <div class="bg-orange-50 rounded-lg p-3">
                <div class="text-xs text-orange-700 font-medium uppercase tracking-wide">Temp. sensor</div>
                <div class="text-2xl font-bold text-orange-900 mt-1">
                  <span x-text="p.ultima_lectura?.valor_temperatura?.toFixed(1) ?? '—'"></span>
                  <span class="text-base font-normal text-orange-600">°C</span>
                </div>
              </div>
            </div>

            <!-- Datos del clima (gateway) -->
            <div class="border-t border-stone-100 pt-3 flex items-center justify-between text-sm">
              <span class="text-stone-500">🌤️ Clima ambiente</span>
              <span class="font-medium text-stone-900">
                <span x-text="p.clima_actual?.temperature ?? '—'"></span>
                <span class="text-stone-500">°C</span>
              </span>
            </div>
          </div>
        </template>
      </section>

      <!-- Alertas del Analytics Engine -->
      <section x-show="resultadoAnalytics" x-cloak class="bg-white rounded-2xl border border-stone-200 p-5 shadow-sm">
        <div class="flex items-center justify-between mb-3">
          <h2 class="text-lg font-semibold text-stone-900">Resultado del análisis</h2>
          <span class="text-xs text-stone-500"
            x-text="`${resultadoAnalytics?.total_alertas ?? 0} alertas`"></span>
        </div>

        <template x-if="resultadoAnalytics?.total_alertas === 0">
          <p class="text-sm text-stone-500 italic">Sin condiciones críticas detectadas en las parcelas evaluadas.</p>
        </template>

        <template x-for="detalle in (resultadoAnalytics?.detalle ?? [])" :key="detalle.nombre_parcela">
          <template x-for="alerta in detalle.alertas_generadas" :key="alerta.tipo + detalle.nombre_parcela">
            <div class="border-l-4 rounded-r-lg p-3 mb-2"
                 :class="{
                   'border-red-500 bg-red-50': alerta.severidad === 'alta',
                   'border-amber-500 bg-amber-50': alerta.severidad === 'media',
                   'border-blue-500 bg-blue-50': alerta.severidad === 'baja'
                 }">
              <div class="flex items-center justify-between mb-1">
                <span class="font-medium text-sm"
                  :class="{
                    'text-red-900': alerta.severidad === 'alta',
                    'text-amber-900': alerta.severidad === 'media',
                    'text-blue-900': alerta.severidad === 'baja'
                  }"
                  x-text="alerta.tipo.replaceAll('_', ' ')"></span>
                <span class="text-xs uppercase tracking-wider font-semibold"
                  :class="{
                    'text-red-700': alerta.severidad === 'alta',
                    'text-amber-700': alerta.severidad === 'media',
                    'text-blue-700': alerta.severidad === 'baja'
                  }"
                  x-text="alerta.severidad"></span>
              </div>
              <p class="text-xs text-stone-700" x-text="alerta.mensaje"></p>
              <p class="text-xs text-stone-500 mt-1" x-text="detalle.nombre_parcela"></p>
            </div>
          </template>
        </template>
      </section>

    </aside>
  </main>

  <footer class="max-w-7xl mx-auto px-6 py-4 text-xs text-stone-400 text-center">
    Datos de sensores: simulados (sensor_simulator) · Datos meteorológicos: Open-Meteo via External Data Gateway
  </footer>

  <script>
    function dashboard() {
      return {
        parcelas: [],
        ultimaActualizacion: '—',
        evaluando: false,
        resultadoAnalytics: null,
        mapa: null,
        marcadores: {},

        async cargar() {
          try {
            const r = await fetch('/dashboard/parcelas');
            const data = await r.json();
            this.parcelas = data.parcelas;
            this.ultimaActualizacion = new Date().toLocaleTimeString('es-AR');
            this.renderMarcadores();
          } catch (e) {
            console.error('Error cargando parcelas', e);
          }
        },

        async evaluarAnalytics() {
          this.evaluando = true;
          try {
            const r = await fetch('/analytics/evaluar', { method: 'POST' });
            this.resultadoAnalytics = await r.json();
          } catch (e) {
            console.error('Error evaluando analytics', e);
          } finally {
            this.evaluando = false;
          }
        },

        renderMarcadores() {
          if (!this.mapa) {
            this.mapa = L.map('mapa').setView([-38.73, -62.28], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
              attribution: '© OpenStreetMap',
              maxZoom: 19,
            }).addTo(this.mapa);
          }
          this.parcelas.forEach(p => {
            const key = p.nombre_parcela;
            const html = `
              <div style="font-family:Inter,sans-serif;min-width:160px">
                <div style="font-weight:600;margin-bottom:4px">${p.nombre_parcela}</div>
                <div style="font-size:12px;color:#666">Sensor: ${p.nombre_codigo_sensor}</div>
                <div style="margin-top:6px;padding-top:6px;border-top:1px solid #eee;font-size:12px">
                  💧 ${p.ultima_lectura?.valor_humedad?.toFixed(1) ?? '—'}%
                  &nbsp;&nbsp;🌡️ ${p.ultima_lectura?.valor_temperatura?.toFixed(1) ?? '—'}°C
                </div>
                <div style="font-size:11px;color:#888;margin-top:4px">
                  Clima ambiente: ${p.clima_actual?.temperature ?? '—'}°C
                </div>
              </div>`;
            const icono = L.divIcon({
              className: '',
              html: `<div style="background:#059669;width:18px;height:18px;border-radius:50%;border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,.3)"></div>`,
              iconSize: [18, 18],
              iconAnchor: [9, 9],
            });
            if (this.marcadores[key]) {
              this.marcadores[key].setPopupContent(html);
            } else {
              this.marcadores[key] = L.marker([p.lat, p.lon], { icon: icono })
                .addTo(this.mapa)
                .bindPopup(html);
            }
          });
        },
      };
    }
  </script>
</body>
</html>
